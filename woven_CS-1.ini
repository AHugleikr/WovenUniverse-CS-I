# =================================================================
# Woven Universe CS-I (Construction Strength I) 
# Reproduced for: "The Woven Universe – A Beginner's Hypothesis"
# Author: A. Hugleikr Stianson
# DOI: 10.5281/zenodo.19896285
# =================================================================
#
# CRITICAL: This .ini requires the 'woven' module integrated into CLASS.
# You must patch include/background.h, source/background.c, and add 
# source/woven.c + include/woven.h before running. 
# See README.md for full build instructions.
#
# =================================================================

# --- Cosmological Parameters: CS-I Best Fit ---
H0 = 73.24
Omega_b = 0.02242
Omega_cdm = 0.11933
A_s = 2.105e-9
n_s = 0.9665
tau_reio = 0.0561
N_ur = 3.044

# --- Woven Universe Parameters ---
# These are hardcoded in woven.c for CS-I. 
# Do NOT set them here. The code uses:
# Delta_E1 = 2.5e-5, Delta_E2 = 8.0e-6, z_c1 = 1e9, z_c2 = 1100, lambda1 = 0.1

# --- Output for PRL Table 2 + Fig 1 ---
output = tCl,pCl,lCl,mPk
l_max_scalars = 3000
P_k_max_h/Mpc = 1.0
z_pk = 0.0,0.5,1.0

# --- Precision for fade accuracy ---
perturbations_verbose = 0
background_verbose = 1
write background = yes
write thermodynamics = no
write primordial = no

# --- Reference LCDM for comparison ---
# To run LCDM: comment out the 'woven' patch and use:
# H0 = 67.36
# Omega_cdm = 0.1200
